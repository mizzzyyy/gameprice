<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <rect width="1200" height="800" fill="#0d1117"/>
  <text x="600" y="48" fill="#58a6ff" font-family="Segoe UI, sans-serif" font-size="28" font-weight="bold" text-anchor="middle">GamePrice Watcher  SQLite (gameprice.db)</text>
  <text x="600" y="78" fill="#8b949e" font-family="Segoe UI, sans-serif" font-size="14" text-anchor="middle">aiosqlite Ě D09; 2 :>@=5 ?@>5:B0</text>

  <defs>
    <style>
      .tbl { fill:#161b22; stroke:#58a6ff; stroke-width:2; }
      .hdr { fill:#e6edf3; font-family:Consolas,monospace; font-size:15px; font-weight:bold; }
      .col { fill:#c9d1d9; font-family:Consolas,monospace; font-size:12px; }
      .rel { stroke:#3fb950; stroke-width:2; fill:none; marker-end:url(#arrow); }
      .reltxt { fill:#3fb950; font-family:Segoe UI,sans-serif; font-size:12px; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#3fb950"/>
    </marker>
  </defs>

  <!-- users -->
  <rect class="tbl" x="40" y="120" width="280" height="200" rx="8"/>
  <text class="hdr" x="60" y="150">users</text>
  <text class="col" x="60" y="178">telegram_id  INTEGER  PK</text>
  <text class="col" x="60" y="198">username       TEXT</text>
  <text class="col" x="60" y="218">language       TEXT  (ru/en)</text>
  <text class="col" x="60" y="238">created_at     TEXT</text>

  <!-- tracked_games -->
  <rect class="tbl" x="400" y="100" width="320" height="280" rx="8"/>
  <text class="hdr" x="420" y="130">tracked_games</text>
  <text class="col" x="420" y="158">id              INTEGER  PK</text>
  <text class="col" x="420" y="178">telegram_id     INTEGER  FK ĺ users</text>
  <text class="col" x="420" y="198">game_title      TEXT</text>
  <text class="col" x="420" y="218">store, store_url TEXT</text>
  <text class="col" x="420" y="238">app_id, cheapshark_id TEXT</text>
  <text class="col" x="420" y="258">target_price    REAL</text>
  <text class="col" x="420" y="278">last_price, currency</text>
  <text class="col" x="420" y="298">last_checked, alert_sent</text>
  <text class="col" x="420" y="318">created_at      TEXT</text>

  <!-- price_history -->
  <rect class="tbl" x="800" y="120" width="300" height="220" rx="8"/>
  <text class="hdr" x="820" y="150">price_history</text>
  <text class="col" x="820" y="178">id           INTEGER  PK</text>
  <text class="col" x="820" y="198">game_key     TEXT  (index)</text>
  <text class="col" x="820" y="218">game_title   TEXT</text>
  <text class="col" x="820" y="238">price, currency REAL/TEXT</text>
  <text class="col" x="820" y="258">store        TEXT</text>
  <text class="col" x="820" y="278">recorded_at  TEXT</text>

  <!-- favorites -->
  <rect class="tbl" x="40" y="450" width="280" height="200" rx="8"/>
  <text class="hdr" x="60" y="480">favorites</text>
  <text class="col" x="60" y="508">id              INTEGER  PK</text>
  <text class="col" x="60" y="528">telegram_id     INTEGER</text>
  <text class="col" x="60" y="548">game_title      TEXT</text>
  <text class="col" x="60" y="568">app_id          TEXT</text>
  <text class="col" x="60" y="588">last_patch_guid TEXT</text>
  <text class="col" x="60" y="608">UNIQUE(telegram_id, app_id)</text>

  <!-- freebie_cache -->
  <rect class="tbl" x="400" y="470" width="320" height="170" rx="8"/>
  <text class="hdr" x="420" y="500">freebie_cache</text>
  <text class="col" x="420" y="528">offer_key    TEXT  PK</text>
  <text class="col" x="420" y="548">title, store TEXT</text>
  <text class="col" x="420" y="568">url          TEXT</text>
  <text class="col" x="420" y="588">notified_at  TEXT</text>

  <!-- relations -->
  <path class="rel" d="M320 220 L400 220"/>
  <text class="reltxt" x="330" y="210">1 : N</text>
  <path class="rel" d="M180 320 L180 450"/>
  <text class="reltxt" x="190" y="390">1 : N</text>

  <text x="600" y="760" fill="#8b949e" font-family="Segoe UI,sans-serif" font-size="13" text-anchor="middle">
    =45:AK: idx_price_history_game(game_key) Ě idx_tracked_user(telegram_id)
  </text>
</svg>
